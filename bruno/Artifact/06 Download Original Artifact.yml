info:
  name: 06 Download Original Artifact
  type: http
  seq: 6

http:
  method: GET
  url: "{{baseUrl}}/api/artifact/{{artifactId}}?original=true"
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("Returns 200", function() {
          expect(res.status).to.equal(200);
        });
        test("Content-Type is image/jpeg", function() {
          expect(res.headers["content-type"]).to.include("image/jpeg");
        });
        test("Content-Disposition has filename", function() {
          expect(res.headers["content-disposition"]).to.include("attachment");
          expect(res.headers["content-disposition"]).to.include("sample.jpg");
        });
        test("Response has JPEG header", function() {
          const buf = res.getDataBuffer();
          expect(buf[0]).to.equal(0xFF);
          expect(buf[1]).to.equal(0xD8);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
