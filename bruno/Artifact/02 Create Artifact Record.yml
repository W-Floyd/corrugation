info:
  name: 02 Create Artifact Record
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/api/record"
  headers:
    - name: content-type
      value: application/json
    - name: accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "Title": "Bruno Artifact Test Record"
      }
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 200) {
          bru.setVar("artifactRecordId", String(res.body.ID));
          bru.setEnvVar("artifactRecordId", String(res.body.ID));
        }
    - type: tests
      code: |-
        test("Returns 200", function() {
          expect(res.status).to.equal(200);
        });
        test("Returns record ID", function() {
          expect(res.body.ID).to.be.a("number").and.greaterThan(0);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
