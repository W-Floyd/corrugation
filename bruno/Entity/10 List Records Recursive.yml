info:
  name: 10 Get Children Full Recursive
  type: http
  seq: 10

http:
  method: GET
  url: "{{baseUrl}}/api/records?childrenDepth=-1"
  headers:
    - name: accept
      value: application/json
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: tests
      code: |-
        const e = res.body[0];

        test("Returns 200", function() {
          expect(res.status).to.equal(200);
        });
        test("Returns exactly one record (no children exist)", function() {
          expect(res.body).to.be.an("array").with.lengthOf(1);
        });
        test("Title is correct", function() {
          expect(e.Title).to.equal("Bruno Test Box (patched)");
        });
        test("Description is correct", function() {
          expect(e.Description).to.equal("Updated by PUT");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
