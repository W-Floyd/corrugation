info:
  name: 09 Patch Quantity
  type: http
  seq: 9

http:
  method: PATCH
  url: "{{baseUrl}}/api/record/{{entityId}}"
  headers:
    - name: content-type
      value: application/json
    - name: accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "Quantity": 10
      }
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: tests
      code: |-
        const e = res.body;

        test("Returns 200", function() {
          expect(res.status).to.equal(200);
        });
        test("Quantity is updated", function() {
          expect(e.Quantity).to.equal(10);
        });
        test("Title is preserved", function() {
          expect(e.Title).to.equal("Bruno Test Box (patched)");
        });
        test("Description is preserved", function() {
          expect(e.Description).to.equal("Updated by PATCH");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
