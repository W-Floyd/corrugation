info:
  name: 10 Patch Tags
  type: http
  seq: 10

http:
  method: PATCH
  url: "{{baseUrl}}/api/record/{{entityId}}"
  headers:
    - name: content-type
      value: application/json
    - name: accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "Tags": [{"Title": "test"}, {"Title": "patched"}]
      }
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: tests
      code: |-
        const e = res.body;

        test("Returns 200", function() {
          expect(res.status).to.equal(200);
        });
        test("Tags are updated", function() {
          const titles = e.Tags.map(t => t.Title);
          expect(titles).to.have.members(["test", "patched"]);
        });
        test("Title is preserved", function() {
          expect(e.Title).to.equal("Bruno Test Box (patched)");
        });
        test("Description is preserved", function() {
          expect(e.Description).to.equal("Updated by PATCH");
        });
        test("Quantity is preserved", function() {
          expect(e.Quantity).to.equal(10);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
