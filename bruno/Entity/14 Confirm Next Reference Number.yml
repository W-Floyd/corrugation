info:
  name: 14 Get Next Reference Number Again
  type: http
  seq: 14

http:
  method: GET
  url: "{{baseUrl}}/api/records/nextref"
  headers:
    - name: accept
      value: application/json
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("Returns 200", function() {
          expect(res.status).to.equal(200);
        });
        test("Next reference number is 1", function() {
          expect(res.body).to.equal(1);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
