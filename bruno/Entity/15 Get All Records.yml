info:
  name: 15 Get All Records
  type: http
  seq: 15

http:
  method: GET
  url: "{{baseUrl}}/api/records?global=true"
  headers:
    - name: accept
      value: application/json
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("Returns 200", function() {
          expect(res.status).to.equal(200);
        });
        test("Returns an array", function() {
          expect(res.body).to.be.an("array");
        });
        test("Contains the patched entity", function() {
          const match = res.body.find(r => String(r.ID) === bru.getEnvVar("entityId"));
          expect(match).to.exist;
          expect(match.Title).to.equal("Bruno Test Box (patched)");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
