info:
  name: 22 Check Next Ref After Deleting A
  type: http
  seq: 22

http:
  method: GET
  url: "{{baseUrl}}/api/records/nextref"
  headers:
    - name: accept
      value: application/json
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: tests
      code: |-
        // State: ref "2" (B) exists, ref "1" (A) deleted — gap at 1 is now lowest
        test("Returns 200", function() {
          expect(res.status).to.equal(200);
        });
        test("Next ref is 1 (gap reopened after deleting A)", function() {
          expect(res.body).to.equal(1);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
