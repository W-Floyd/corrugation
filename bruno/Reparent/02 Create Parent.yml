info:
  name: Create Parent
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/api/record"
  headers:
    - name: content-type
      value: application/json
    - name: accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "Title": "Parent Box",
        "ParentID": {{reparentGrandparentId}},
        "Quantity": 1
      }
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 200) {
          bru.setVar("reparentParentId", String(res.body.ID));
        }
    - type: tests
      code: |-
        test("Returns 200", function() {
          expect(res.status).to.equal(200);
        });
        test("Returns ID", function() {
          expect(res.body.ID).to.be.a("number").and.greaterThan(0);
        });
