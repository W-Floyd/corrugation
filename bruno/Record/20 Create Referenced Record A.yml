info:
  name: 20 Create Referenced Record A
  type: http
  seq: 18

http:
  method: POST
  url: "{{baseUrl}}/api/record"
  headers:
    - name: content-type
      value: application/json
    - name: accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "Title": "Referenced Record A",
        "ReferenceNumber": "1",
        "Quantity": 1
      }
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 200) {
          bru.setEnvVar("labeledRecordIdA", String(res.body.ID));
        }
    - type: tests
      code: |-
        test("Returns 200", function() {
          expect(res.status).to.equal(200);
        });
        test("ReferenceNumber is set", function() {
          expect(res.body.ReferenceNumber).to.equal("1");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
