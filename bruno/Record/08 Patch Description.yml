info:
  name: 08 Patch Description
  type: http
  seq: 8

http:
  method: PATCH
  url: "{{baseUrl}}/api/record/{{recordId}}"
  headers:
    - name: content-type
      value: application/json
    - name: accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "Description": "Updated by PATCH"
      }
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: tests
      code: |-
        const e = res.body;

        test("Returns 200", function() {
          expect(res.status).to.equal(200);
        });
        test("Description is updated", function() {
          expect(e.Description).to.equal("Updated by PATCH");
        });
        test("Title is preserved", function() {
          expect(e.Title).to.equal("Bruno Test Box (patched)");
        });
        test("Quantity is preserved", function() {
          expect(e.Quantity).to.equal(5);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
