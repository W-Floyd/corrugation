info:
  name: 14 Top Level Contains Record
  type: http
  seq: 14

http:
  method: GET
  url: "{{baseUrl}}/api/records"
  headers:
    - name: accept
      value: application/json
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: tests
      code: |-
        const ids = res.body.map(r => String(r.ID));

        test("Returns 200", function() {
          expect(res.status).to.equal(200);
        });
        test("Record appears in top-level records", function() {
          expect(ids).to.include(bru.getEnvVar("recordId"));
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
