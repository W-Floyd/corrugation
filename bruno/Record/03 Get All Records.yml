info:
  name: 03 Get All Records
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/api/records?global=true"
  headers:
    - name: accept
      value: application/json
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("Returns 200", function() {
          expect(res.status).to.equal(200);
        });
        test("Returns an array", function() {
          expect(res.body).to.be.an("array");
        });
        test("Contains exactly one record", function() {
          expect(res.body).to.have.lengthOf(1);
        });
        const e = res.body[0];
        test("Record ID is correct", function() {
          expect(e.ID).to.equal(parseInt(bru.getEnvVar("recordId")));
        });
        test("Title is correct", function() {
          expect(e.Title).to.equal("Bruno Test Box");
        });
        test("Description is correct", function() {
          expect(e.Description).to.equal("Created by Bruno test suite");
        });
        test("Quantity is correct", function() {
          expect(e.Quantity).to.equal(3);
        });
        test("No parent (top-level)", function() {
          expect(e.ParentID).to.be.undefined;
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
