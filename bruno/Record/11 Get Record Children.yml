info:
  name: 11 Get Record Children
  type: http
  seq: 11

http:
  method: GET
  url: "{{baseUrl}}/api/records?id={{recordId}}&childrenDepth=1"
  headers:
    - name: accept
      value: application/json
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("Returns 200", function() {
          expect(res.status).to.equal(200);
        });
        test("Returns only the record itself (no children)", function() {
          expect(res.body).to.be.an("array").with.lengthOf(1);
          expect(res.body[0].ID).to.equal(parseInt(bru.getEnvVar("recordId")));
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
