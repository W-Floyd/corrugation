info:
  name: Login
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/api/auth/local/login"
  headers:
    - name: content-type
      value: application/json
  body:
    type: json
    data: |-
      {
        "username": "{{username}}"
      }
  auth:
    type: none

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 200 && res.body.username) {
          bru.setEnvVar("authToken", res.body.username);
        }
    - type: tests
      code: |-
        test("Login succeeds", function() {
          expect(res.status).to.equal(200);
        });
        test("Username is returned", function() {
          expect(res.body).to.have.property("username");
        });
        test("Username matches", function() {
          expect(res.body.username).to.equal(bru.getEnvVar("username"));
        });
