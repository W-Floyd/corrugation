info:
  name: Get Children Full Recursive
  type: http
  seq: 6

http:
  method: GET
  url: "{{baseUrl}}/api/records?id={{parentId}}&childrenDepth=-1"
  headers:
    - name: accept
      value: application/json
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("Returns 200", function() {
          expect(res.status).to.equal(200);
        });
        test("Returns parent, child, and grandchild", function() {
          expect(res.body).to.be.an("array").with.lengthOf(3);
        });
        test("Contains child by title", function() {
          expect(res.body.map(r => r.Title)).to.include("Child Box");
        });
        test("Contains grandchild by title", function() {
          expect(res.body.map(r => r.Title)).to.include("Grandchild Box");
        });
