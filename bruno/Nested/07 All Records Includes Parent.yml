info:
  name: Find Locations Includes Parent
  type: http
  seq: 7

http:
  method: GET
  url: "{{baseUrl}}/api/records?global=true"
  headers:
    - name: accept
      value: application/json
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: tests
      code: |-
        const ids = res.body.map(r => String(r.ID));

        test("Returns 200", function() {
          expect(res.status).to.equal(200);
        });
        test("Parent appears in all records", function() {
          expect(ids).to.include(bru.getVar("parentId"));
        });
        test("Child appears in all records", function() {
          expect(ids).to.include(bru.getVar("childId"));
        });
