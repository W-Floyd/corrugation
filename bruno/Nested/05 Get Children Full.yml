info:
  name: Get Children Full
  type: http
  seq: 5

http:
  method: GET
  url: "{{baseUrl}}/api/records?id={{parentId}}&childrenDepth=1"
  headers:
    - name: accept
      value: application/json
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: tests
      code: |-
        const child = res.body.find(r => String(r.ID) === bru.getVar("childId"));

        test("Returns 200", function() {
          expect(res.status).to.equal(200);
        });
        test("Response contains parent and direct child", function() {
          expect(res.body).to.be.an("array").with.lengthOf(2);
        });
        test("Child title is correct", function() {
          expect(child.Title).to.equal("Child Box");
        });
        test("Child ParentID is correct", function() {
          expect(String(child.ParentID)).to.equal(bru.getVar("parentId"));
        });
