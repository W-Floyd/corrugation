info:
  name: Create Child Entity
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/api/record"
  headers:
    - name: content-type
      value: application/json
    - name: accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "Title": "Child Box",
        "Description": "Nested inside Parent Box",
        "ParentID": {{parentId}},
        "Quantity": 1
      }
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 200) {
          bru.setVar("childId", String(res.body.ID));
          bru.setEnvVar("childId", String(res.body.ID));
        }
    - type: tests
      code: |-
        test("Returns 200", function() {
          expect(res.status).to.equal(200);
        });
        test("Returns child record ID", function() {
          expect(res.body.ID).to.be.a("number").and.greaterThan(0);
        });
        test("ParentID is set correctly", function() {
          expect(res.body.ParentID).to.equal(parseInt(bru.getVar("parentId")));
        });
